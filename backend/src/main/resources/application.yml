spring:
  application:
    name: abmsa-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/abmsa?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.abmsa.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

model:
  service:
    url: http://localhost:5000

crawler:
  schedule:
    cron: "0 0 */1 * * ?"
  enabled: true

target:
  extract:
    strategy: RULE_FIRST

jwt:
  secret: abmsa-jwt-secret-key-2024-multimodal-sentiment-analysis
  expiration: 86400000

logging:
  level:
    com.abmsa: debug
