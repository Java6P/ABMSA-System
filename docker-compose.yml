version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: abmsa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: abmsa
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  model-service:
    build: ./model-service
    container_name: abmsa-model
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    container_name: abmsa-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/abmsa?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      MODEL_SERVICE_URL: http://model-service:5000
    depends_on:
      mysql:
        condition: service_healthy
      model-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: abmsa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
